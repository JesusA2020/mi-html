<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proceso Electoral Federal — Flujo Completo (Corregido)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap');

:root {
  --bg: #06080f;
  --surface: #0c0f1a;
  --card: #111828;
  --border: #1a2235;
  --text: #dde4f5;
  --muted: #4a5678;
  --dim: #2a3450;

  /* Stage colors */
  --c0: #8b5cf6;   /* inicio */
  --c1: #3b82f6;   /* preparacion */
  --c2: #10b981;   /* jornada */
  --c3: #f59e0b;   /* escrutinio */
  --c4: #ef4444;   /* computo */
  --c5: #ec4899;   /* resultados */
  --c6: #06b6d4;   /* validez */

  /* Actor colors */
  --a-cg: #fbbf24;
  --a-jde: #818cf8;
  --a-jde-dist: #fb923c;
  --a-cd: #34d399;
  --a-casilla: #a78bfa;
  --a-ciudadano: #38bdf8;
  --a-partido: #f472b6;
  --a-tepjf: #f87171;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, rgba(139,92,246,0.15) 0%, rgba(59,130,246,0.08) 100%);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem 1rem;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
header h1 { font-size: clamp(1.1rem, 3vw, 1.7rem); font-weight: 800; color: #fff; }
header h1 span { color: var(--c0); }
.header-sub { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.15em; margin-top: 0.2rem; }

/* NAV PILLS */
.stage-nav {
  display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.8rem;
}
.snav-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.3rem 0.7rem; border-radius: 20px;
  border: 1px solid; cursor: pointer;
  transition: all 0.15s;
}
.snav-btn:hover, .snav-btn.active { filter: brightness(1.3); }

/* ACTOR LEGEND */
.actor-legend {
  display: flex; flex-wrap: wrap; gap: 0.4rem 1rem;
  padding: 0.6rem 2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.3);
}
.al-item {
  display: flex; align-items: center; gap: 0.3rem;
  font-size: 0.62rem; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.al-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 120px);
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 1rem 0;
  position: sticky; top: 80px;
  height: calc(100vh - 80px);
  overflow-y: auto;
}
.sidebar-stage {
  padding: 0.6rem 1rem;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.sidebar-stage:hover { background: rgba(255,255,255,0.03); }
.sidebar-stage.active { background: rgba(255,255,255,0.05); }
.ss-label { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.2rem; }
.ss-name { font-size: 0.8rem; font-weight: 600; color: #fff; }
.ss-date { font-size: 0.6rem; color: var(--muted); margin-top: 0.15rem; font-family: 'JetBrains Mono', monospace; }

/* CONTENT */
.content { overflow-y: auto; padding: 1.5rem 2rem; }

/* STAGE SECTION */
.stage-section {
  margin-bottom: 2.5rem;
  scroll-margin-top: 90px;
}
.stage-header {
  display: flex; align-items: center; gap: 0.8rem;
  margin-bottom: 1rem; padding-bottom: 0.6rem;
  border-bottom: 2px solid;
}
.stage-num {
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
  font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 3px;
}
.stage-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.1rem; color: #fff; }
.stage-period { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

/* ACTIVITY GRID */
.activity-grid { display: flex; flex-direction: column; gap: 0.5rem; }

/* ACTIVITY CARD */
.act-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: all 0.15s;
}
.act-card:hover { border-color: var(--dim); transform: translateX(3px); }

.act-header {
  display: flex; align-items: stretch; gap: 0;
  cursor: pointer;
}
.act-stripe { width: 4px; flex-shrink: 0; }
.act-main { flex: 1; padding: 0.65rem 0.9rem; }
.act-top { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.act-date {
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
  font-weight: 600; letter-spacing: 0.08em;
  padding: 0.15rem 0.5rem; border-radius: 3px;
  background: rgba(255,255,255,0.06);
  white-space: nowrap;
}
.act-title { font-weight: 600; font-size: 0.82rem; color: #fff; flex: 1; }
.act-actors { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.35rem; }
.actor-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 0.5rem;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.1rem 0.4rem; border-radius: 2px;
  border: 1px solid;
}
.act-toggle { padding: 0.65rem 0.7rem; display: flex; align-items: center; color: var(--muted); font-size: 0.7rem; transition: color 0.15s; }
.act-card:hover .act-toggle { color: var(--text); }

/* DETAIL PANEL */
.act-detail {
  display: none;
  padding: 0 0.9rem 0.8rem 1.3rem;
  border-top: 1px solid var(--border);
}
.act-detail.open { display: block; }

.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.8rem; margin-top: 0.6rem; }

.detail-block {
  background: rgba(255,255,255,0.02);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  border: 1px solid var(--border);
}
.db-title {
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.4rem;
  padding-bottom: 0.25rem; border-bottom: 1px solid var(--border);
}
.db-list { list-style: none; }
.db-list li {
  font-size: 0.72rem; padding: 0.2rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  display: flex; gap: 0.3rem; align-items: flex-start;
  color: var(--text); line-height: 1.4;
}
.db-list li::before { content: '›'; color: var(--muted); flex-shrink: 0; }
.db-list li.key { color: #fff; font-weight: 500; }
.db-list li.key::before { content: '★'; font-size: 0.5rem; color: inherit; }
.db-list li.law { color: var(--muted); font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; }
.db-list li.law::before { content: '§'; color: var(--muted); }

/* FLOW ARROW */
.flow-connector {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.25rem 0 0.25rem 0.5rem;
  margin: 0.2rem 0;
}
.flow-line {
  flex: 1; height: 1px;
  background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 4px, transparent 4px, transparent 8px);
}
.flow-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
  letter-spacing: 0.1em; color: var(--muted);
  padding: 0.15rem 0.4rem; border-radius: 3px;
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* TIMELINE BAR */
.timeline-overview {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.2rem;
  margin-bottom: 2rem;
}
.tl-title { font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; }
.tl-bar {
  display: flex; height: 28px; border-radius: 5px; overflow: hidden;
  gap: 1px;
}
.tl-seg {
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 0.5rem;
  font-weight: 700; letter-spacing: 0.05em;
  cursor: pointer; transition: filter 0.15s;
  text-align: center; padding: 0 0.3rem;
  white-space: nowrap; overflow: hidden;
}
.tl-seg:hover { filter: brightness(1.3); }
.tl-months { display: flex; margin-top: 0.3rem; font-family: 'JetBrains Mono', monospace; font-size: 0.52rem; color: var(--muted); justify-content: space-between; padding: 0 2px; }

/* Actor color classes */
.a-cg { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.4); color: var(--a-cg); }
.a-jl { background: rgba(129,140,248,0.12); border-color: rgba(129,140,248,0.4); color: var(--a-jde); }
.a-jd { background: rgba(251,146,60,0.12); border-color: rgba(251,146,60,0.4); color: var(--a-jde-dist); }
.a-cd { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.4); color: var(--a-cd); }
.a-cas { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.4); color: var(--a-casilla); }
.a-ciu { background: rgba(56,189,248,0.12); border-color: rgba(56,189,248,0.4); color: var(--a-ciudadano); }
.a-par { background: rgba(244,114,182,0.12); border-color: rgba(244,114,182,0.4); color: var(--a-partido); }
.a-tep { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.4); color: var(--a-tepjf); }
.a-cl { background: rgba(129,140,248,0.12); border-color: rgba(129,140,248,0.3); color: #a5b4fc; }
.a-prep { background: rgba(6,182,212,0.12); border-color: rgba(6,182,212,0.4); color: var(--c6); }

@media (max-width: 700px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content { padding: 1rem; }
}

/* Scroll bar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>Proceso Electoral <span>Federal</span> — Flujo Completo</h1>
      <div class="header-sub">LGIPE · Reglamento de Elecciones · Art. 207-320 · Basado en fuentes oficiales INE 2024-2025</div>
    </div>
  </div>
  <div class="stage-nav" id="stageNav"></div>
</header>

<div class="actor-legend">
  <div class="al-item"><div class="al-dot" style="background:var(--a-cg)"></div>Consejo General</div>
  <div class="al-item"><div class="al-dot" style="background:var(--a-jde)"></div>Junta Local</div>

  <div class="al-item"><div class="al-dot" style="background:var(--a-cd)"></div>Consejo Distrital</div>
  <div class="al-item"><div class="al-dot" style="background:var(--a-casilla)"></div>Mesa Directiva Casilla</div>
  <div class="al-item"><div class="al-dot" style="background:var(--a-ciudadano)"></div>Ciudadano/Elector</div>
  <div class="al-item"><div class="al-dot" style="background:var(--a-partido)"></div>Partidos Políticos</div>
  <div class="al-item"><div class="al-dot" style="background:var(--a-tepjf)"></div>TEPJF</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════

// Actor tag builder
function actTag(cls, label) {
  return `<span class="actor-tag ${cls}">${label}</span>`;
}

// Build nav
const nav = document.getElementById('stageNav');
stages.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'snav-btn';
  btn.textContent = s.title;
  btn.style.borderColor = s.color + '80';
  btn.style.color = s.color;
  btn.style.background = s.color + '18';
  btn.onclick = () => {
    document.getElementById('stage-' + s.id).scrollIntoView({behavior:'smooth'});
  };
  nav.appendChild(btn);
});

// Build sidebar
const sidebar = document.getElementById('sidebar');
stages.forEach(s => {
  const el = document.createElement('div');
  el.className = 'sidebar-stage';
  el.id = 'sb-' + s.id;
  el.style.borderLeftColor = s.color;
  el.innerHTML = `
    <div class="ss-label" style="color:${s.color}">${s.num} · ${s.title}</div>
    <div class="ss-date">${s.dateLabel}</div>
  `;
  el.onclick = () => document.getElementById('stage-' + s.id).scrollIntoView({behavior:'smooth'});
  sidebar.appendChild(el);
});

// Build timeline
const content = document.getElementById('content');

// Timeline bar
const tl = document.createElement('div');
tl.className = 'timeline-overview';
const segs =[
  {label:'SEP·AÑO PREVIO', color:'#8b5cf6', flex:1, id:'inicio'},
  {label:'ENE–MAY', color:'#3b82f6', flex:2.5, id:'preparacion'},
  {label:'JUN DÍA', color:'#10b981', flex:0.5, id:'jornada'},
  {label:'ESCRUTINIO', color:'#f59e0b', flex:0.5, id:'escrutinio'},
  {label:'PREP', color:'#ec4899', flex:0.3, id:'prep'},
  {label:'CÓMPUTOS', color:'#ef4444', flex:0.7, id:'computo'},
  {label:'VALIDEZ', color:'#06b6d4', flex:1, id:'validez'},
];
tl.innerHTML = `
  <div class="tl-title">↔ Línea de Tiempo — Proceso Electoral Federal Completo (aprox. 10 meses)</div>
  <div class="tl-bar">
    ${segs.map(s => `<div class="tl-seg" style="flex:${s.flex};background:${s.color}22;border:1px solid ${s.color}55;color:${s.color}" onclick="document.getElementById('stage-${s.id}').scrollIntoView({behavior:'smooth'})">${s.label}</div>`).join('')}
  </div>
  <div class="tl-months">
    <span>SEP</span><span>NOV</span><span>ENE</span><span>MAR</span><span>MAY</span><span>JUN</span><span>JUL</span><span>AGO</span>
  </div>
`;
content.appendChild(tl);

// Build stages
stages.forEach(stage => {
  const sec = document.createElement('div');
  sec.className = 'stage-section';
  sec.id = 'stage-' + stage.id;

  let actsHtml = '';
  stage.activities.forEach((act, idx) => {
    const actorTagsHtml = act.actors.map((a, i) => actTag(a, act.actorLabels[i])).join('');

    let detailHtml = '';

    // Actividades
    if (act.actividades && act.actividades.length) {
      detailHtml += `<div class="detail-grid">`;
      detailHtml += `<div class="detail-block"><div class="db-title">📋 Actividades</div><ul class="db-list">`;
      act.actividades.forEach(a => {
        if (a.law) {
          detailHtml += `<li class="law">${a.text}</li>`;
        } else {
          detailHtml += `<li class="${a.key ? 'key' : ''}">${a.text}</li>`;
        }
      });
      detailHtml += '</ul></div>';

      // Responsabilidades
      if (act.responsabilidades) {
        detailHtml += `<div class="detail-block"><div class="db-title">👤 Responsables & Rol</div><ul class="db-list">`;
        act.responsabilidades.forEach(r => {
          detailHtml += `<li><strong style="color:#fff;font-size:0.68rem">${r.actor}</strong>: ${r.role}</li>`;
        });
        detailHtml += '</ul></div>';
      }

      detailHtml += '</div>';

      // Flujo
      if (act.flujo) {
        detailHtml += `<div style="margin-top:0.5rem;padding:0.5rem 0.7rem;background:rgba(255,255,255,0.02);border-radius:5px;border:1px solid var(--border)">
          <div class="db-title" style="margin-bottom:0.3rem">→ Flujo</div>
          ${act.flujo.map(f => `<div style="font-size:0.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace">${f}</div>`).join('')}
        </div>`;
      }

      // Refs
      if (act.refs) {
        detailHtml += `<div style="margin-top:0.4rem;display:flex;gap:0.3rem;flex-wrap:wrap">`;
        act.refs.forEach(r => {
          detailHtml += `<span style="font-family:'JetBrains Mono',monospace;font-size:0.52rem;padding:0.12rem 0.4rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:3px;color:var(--muted)">${r}</span>`;
        });
        detailHtml += '</div>';
      }
    }

    actsHtml += `
      <div class="act-card" id="act-${act.id}">
        <div class="act-header" onclick="toggleDetail('${act.id}')">
          <div class="act-stripe" style="background:${act.color}"></div>
          <div class="act-main">
            <div class="act-top">
              <span class="act-date">${act.date}</span>
              <span class="act-title">${act.title}</span>
            </div>
            <div class="act-actors">${actorTagsHtml}</div>
          </div>
          <div class="act-toggle" id="toggle-${act.id}">▸</div>
        </div>
        <div class="act-detail" id="detail-${act.id}">
          ${detailHtml}
        </div>
      </div>
    `;
  });

  sec.innerHTML = `
    <div class="stage-header" style="border-color:${stage.color}40">
      <span class="stage-num" style="background:${stage.color}20;color:${stage.color}">${stage.num}</span>
      <span class="stage-title">${stage.title}</span>
      <span class="stage-period">${stage.period}</span>
    </div>
    <div class="activity-grid">${actsHtml}</div>
  `;
  content.appendChild(sec);
});

// Toggle detail
function toggleDetail(id) {
  const det = document.getElementById('detail-' + id);
  const tog = document.getElementById('toggle-' + id);
  if (det.classList.contains('open')) {
    det.classList.remove('open');
    tog.textContent = '▸';
  } else {
    det.classList.add('open');
    tog.textContent = '▾';
  }
}

// Intersection observer for sidebar highlight
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id.replace('stage-', '');
      document.querySelectorAll('.sidebar-stage').forEach(s => s.classList.remove('active'));
      const sb = document.getElementById('sb-' + id);
      if (sb) sb.classList.add('active');
    }
  });
}, {threshold: 0.3});

stages.forEach(s => {
  const el = document.getElementById('stage-' + s.id);
  if (el) observer.observe(el);
});
</script>
